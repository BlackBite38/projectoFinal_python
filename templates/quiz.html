{% extends 'base.html' %}

{% block content %}

<h2>{{ quiz.title }}</h2>

<form method="POST">

    {% for question in questions %}

        <div class="question-box">

            <h3>{{ question.question }}</h3>

            <label>
                <input
                    type="radio"
                    name="question-{{ question.id }}"
                    value="1"
                    required>

                {{ question.option1 }}
            </label>

            <br>

            <label>
                <input
                    type="radio"
                    name="question-{{ question.id }}"
                    value="2">

                {{ question.option2 }}
            </label>

            <br>

            <label>
                <input
                    type="radio"
                    name="question-{{ question.id }}"
                    value="3">

                {{ question.option3 }}
            </label>

            <br>

            <label>
                <input
                    type="radio"
                    name="question-{{ question.id }}"
                    value="4">

                {{ question.option4 }}
            </label>

        </div>

    {% endfor %}

    <button type="submit">
        Enviar
    </button>

</form>

{% endblock %}
